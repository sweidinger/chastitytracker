name: Build, Push & Deploy

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Nach dem Build deployen?"
        required: false
        type: boolean
        default: true
      instances:
        description: "Instanzen updaten (kommagetrennt, z.B. kunde1,kunde2). Leer = alle."
        required: false
        default: ""
      channel:
        description: "Ziel-Instanzen auf diesen Image-Tag umpinnen (z.B. feature, latest). Leer = bestehende Pins behalten."
        required: false
        default: ""
      tagFeature:
        description: "Image zusätzlich als :feature taggen (auch bei main-Builds) — damit auf :feature gepinnte Instanzen diesen Build ziehen, ohne umzupinnen."
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Typecheck (parallel zum Docker-Build) ──────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  # ── Docker Image bauen & pushen ────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        run: |
          NEW_VERSION=$(jq -r .version package.json)
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Two rolling channels:
          #   main (default branch) -> :latest   (stable)
          #   any feature branch    -> :feature  (rolling feature channel; trublue pins this once)
          # The enable guards ensure a feature build never overwrites the stable :latest.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=feature,enable=${{ github.ref_name != 'main' || github.event.inputs.tagFeature == 'true' }}
            type=raw,value=v${{ env.NEW_VERSION }}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}

  # ── Deploy auf Server ──────────────────────────────────────────────────────
  deploy:
    needs: [build-and-push, typecheck]
    if: ${{ github.event.inputs.deploy != 'false' }}
    runs-on: ubuntu-latest

    env:
      INSTANCES_INPUT: ${{ github.event.inputs.instances }}
      CHANNEL_INPUT: ${{ github.event.inputs.channel }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          INSTANCES_INPUT: ${{ env.INSTANCES_INPUT }}
          CHANNEL_INPUT: ${{ env.CHANNEL_INPUT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: INSTANCES_INPUT,CHANNEL_INPUT
          script: |
            INSTANCES_DIR="$HOME/instances"

            # Targets bestimmen
            if [ -n "$INSTANCES_INPUT" ]; then
              IFS=',' read -ra TARGETS <<< "$INSTANCES_INPUT"
            else
              TARGETS=()
              for dir in "$INSTANCES_DIR"/*/; do
                [ -f "$dir/docker-compose.yml" ] && TARGETS+=("$(basename "$dir")")
              done
            fi

            # Jede Instanz zieht ihren EIGENEN in der docker-compose.yml gepinnten Image-Tag
            # (z.B. :latest = stable, oder :feat-xyz für ein Feature-Image). Daher pro Instanz
            # ein eigenes `docker compose pull` statt eines globalen Pulls.

            # Instanzen parallel updaten
            PIDS=()
            for INSTANCE in "${TARGETS[@]}"; do
              DIR="$INSTANCES_DIR/$INSTANCE"
              if [ ! -f "$DIR/docker-compose.yml" ]; then
                echo "⚠ Instanz '$INSTANCE' nicht gefunden, übersprungen."
                continue
              fi
              (
                echo "→ Update $INSTANCE ..."
                cd "$DIR"
                # Optional: Instanz auf einen anderen Image-Tag umpinnen (z.B. :feature, :latest).
                # CHANNEL_INPUT ist auf ein striktes Tag-Muster validiert (keine Shell-/sed-Injection).
                if [ -n "$CHANNEL_INPUT" ]; then
                  case "$CHANNEL_INPUT" in
                    *[!A-Za-z0-9._-]*) echo "⚠ Ungültiger channel '$CHANNEL_INPUT' — übersprungen." ;;
                    *)
                      echo "→ Pinne $INSTANCE auf :$CHANNEL_INPUT"
                      sed -i "s#\(ghcr.io/trublue-2/chastitytracker\):[A-Za-z0-9._-]*#\1:$CHANNEL_INPUT#" docker-compose.yml
                      ;;
                  esac
                fi
                docker compose pull
                docker compose up -d --force-recreate
                echo "✓ $INSTANCE aktualisiert."
              ) &
              PIDS+=($!)
            done

            # Auf alle parallelen Deploys warten
            FAILED=0
            for pid in "${PIDS[@]}"; do
              wait "$pid" || FAILED=$((FAILED + 1))
            done

            docker image prune -f

            if [ "$FAILED" -gt 0 ]; then
              echo "⚠ $FAILED Instanz(en) fehlgeschlagen!"
              exit 1
            fi
            echo "✓ Alle ${#TARGETS[@]} Instanzen aktualisiert."
