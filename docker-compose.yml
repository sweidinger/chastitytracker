services:
  kg-tracker:
    build: .
    container_name: kg-tracker
    init: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # SQLite-Datenbank + Foto-Uploads persistent speichern
      # (Uploads landen intern unter /app/data/uploads)
      - kg-data:/app/data

volumes:
  kg-data:
